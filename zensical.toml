# ============================================================================
# CIS111 Textbook -- Zensical configuration
#
# Zensical (https://zensical.org) is the successor to Material for MkDocs,
# built by the same team. Every textbook in the textbooks/ family uses this
# same publishing pipeline.
#
# Build:   zensical build --clean      (output -> site/)
# Preview: zensical serve              (http://localhost:8000)
# Deploy:  GitHub Actions -> GitHub Pages (see .github/workflows/docs.yml)
# ============================================================================

[project]
site_name = "CIS111: Ethics in Information Technology"
site_description = "An applied guide to ethical reasoning, professional responsibility, privacy, security, and emerging technology decisions in information technology."
site_author = "Jorge Vega, Phoenix College"
site_url = "https://jor2050111.github.io/cis111/"

# The published textbook is the single source of truth. Authoring/dev
# references live in docs/ and are intentionally not part of the site.
docs_dir = "book"
site_dir = "site"

# Source repository (powers the header repo link and content edit buttons)
repo_url = "https://github.com/jor2050111/cis111"
repo_name = "jor2050111/cis111"
edit_uri = "edit/main/book/"

copyright = "Copyright &copy; 2026 Jorge Vega, Phoenix College. All rights reserved."

# Brand styling: Sonoran Nightfall design system, synced from ../shared/.
# colors.css defines the design tokens (source of truth). brand.css maps
# them to Zensical theme vars. Never hand-edit the synced copies here.
extra_css = ["stylesheets/colors.css", "stylesheets/brand.css"]

# Explicit navigation mirrors the Part structure of the textbook.
nav = [
  { "Home" = "index.md" },
  { "Part I: Foundations of Ethics" = [
    { "Chapter 1: Ethics and Ethical Theories" = "chapters/chapter-01.md" },
    { "Chapter 2: Work Business Ethics and IT Worker Duties" = "chapters/chapter-02.md" },
    { "Chapter 3: Corporate Governance, CSR, and AI Ethics" = "chapters/chapter-03.md" },
  ] },
  { "Part II: Digital Rights and Responsibilities" = [
    { "Chapter 4: Social Media Responsibility" = "chapters/chapter-04.md" },
    { "Chapter 5: Whistleblowing and Accountability" = "chapters/chapter-05.md" },
    { "Chapter 6: Healthcare IT Ethics" = "chapters/chapter-06.md" },
  ] },
  { "Part III: Legal Frameworks and IT Obligations" = [
    { "Chapter 7: Software Liability and Secure Design" = "chapters/chapter-07.md" },
    { "Chapter 8: Regulation, Self-Regulation, and IT Work" = "chapters/chapter-08.md" },
    { "Chapter 9: Intellectual Property, Fair Use, and AI" = "chapters/chapter-09.md" },
  ] },
  { "Part IV: Security, Privacy, and Professional Practice" = [
    { "Chapter 10: Online Speech, Identity, and Worker Monitoring" = "chapters/chapter-10.md" },
    { "Chapter 11: Cybersecurity Risk, Identity Theft, and Incident Response" = "chapters/chapter-11.md" },
    { "Chapter 12: Professional Duty and Ethical Action" = "chapters/chapter-12.md" },
  ] },
  { "Glossary" = "glossary.md" },
  { "Skills Lab Rubric" = "skills-lab-rubric.md" },
]

# ----------------------------------------------------------------------------
# Theme (modern is the default Zensical variant)
# ----------------------------------------------------------------------------
[project.theme]
language = "en"

features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
]

[project.theme.icon]
logo = "lucide/book-open"

[project.theme.font]
text = "Roboto"
code = "Roboto Mono"

# Custom brand palette; color values are defined in book/stylesheets/brand.css
[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# Markdown extensions (Zensical recommended set: arithmatex renders LaTeX
# math, tables render pipe tables)
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
permalink = true
toc_depth = 3
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
base_path = ["book"]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
